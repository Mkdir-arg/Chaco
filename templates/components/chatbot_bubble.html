<!-- Chatbot Bubble -->
<div
    id="chatbot-bubble"
    x-data="chatbotBubble()"
    class="fixed bottom-6 right-6 z-50"
    data-send-message-url="{% url 'chatbot:send_message' %}">
    <!-- Bubble Button -->
    <button 
        @click="toggleChat()"
        class="rounded-full flex items-center justify-center shadow-lg transition-all duration-300 transform hover:scale-110"
        style="width: {{ branding.chatbot_bubble.size }}; height: {{ branding.chatbot_bubble.size }}; background: {{ branding.chatbot_bubble.background }}; color: {{ branding.chatbot_bubble.icon_color }};"
        onmouseover="this.style.background='{{ branding.chatbot_bubble.hover_background }}'"
        onmouseout="this.style.background='{{ branding.chatbot_bubble.background }}'"
        :class="{ 'hidden': isOpen }"
    >
        <i class="fas fa-robot" style="font-size: {{ branding.chatbot_bubble.icon_size }}; color: {{ branding.chatbot_bubble.icon_color }};"></i>
    </button>

    <!-- Chat Window -->
    <div 
        x-show="isOpen" 
        x-transition:enter="transition ease-out duration-300"
        x-transition:enter-start="opacity-0 transform scale-95"
        x-transition:enter-end="opacity-100 transform scale-100"
        x-transition:leave="transition ease-in duration-200"
        x-transition:leave-start="opacity-100 transform scale-100"
        x-transition:leave-end="opacity-0 transform scale-95"
        class="bg-white rounded-lg shadow-2xl w-80 h-96 flex flex-col"
        style="display: none;"
    >
        <!-- Header -->
        <div class="text-white p-4 rounded-t-lg flex justify-between items-center" style="background: {{ branding.chatbot_window.header_background }};">
            <div class="flex items-center gap-2">
                <i class="fas fa-robot"></i>
                <span class="font-semibold">{{ branding.chatbot_window.title }}</span>
            </div>
            <button @click="toggleChat()" class="hover:bg-white/20 rounded p-1">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <!-- Messages -->
        <div class="flex-1 p-4 overflow-y-auto" id="chat-messages">
            <div class="bg-gray-100 rounded-lg p-3 mb-3">
                <p class="text-sm">{{ branding.chatbot_window.welcome_message }}</p>
            </div>
        </div>

        <!-- Input -->
        <div class="p-4 border-t">
            <form @submit.prevent="sendMessage()" class="flex gap-2">
                <input 
                    type="text" 
                    x-model="message"
                    placeholder="Escribe tu mensaje..."
                    class="flex-1 border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2"
                    style="--tw-ring-color: {{ branding.chatbot_window.input_focus_ring }};"
                    :disabled="isLoading"
                >
                <button 
                    type="submit"
                    class="text-white px-3 py-2 rounded-lg transition-colors disabled:opacity-50"
                    style="background: {{ branding.chatbot_window.submit_background }};"
                    onmouseover="this.style.background='{{ branding.chatbot_window.submit_hover_background }}'"
                    onmouseout="this.style.background='{{ branding.chatbot_window.submit_background }}'"
                    :disabled="isLoading || !message.trim()"
                >
                    <i class="fas fa-paper-plane" x-show="!isLoading"></i>
                    <i class="fas fa-spinner fa-spin" x-show="isLoading"></i>
                </button>
            </form>
        </div>
    </div>
</div>

<script>
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}

function chatbotBubble() {
    return {
        isOpen: false,
        message: '',
        isLoading: false,
        
        toggleChat() {
            this.isOpen = !this.isOpen;
        },
        
        async sendMessage() {
            if (!this.message.trim()) return;
            
            const userMessage = this.message;
            this.message = '';
            this.isLoading = true;
            
            // Add user message to chat
            this.addMessage(userMessage, 'user');
            
            try {
                const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]')?.value || 
                                 document.querySelector('meta[name="csrf-token"]')?.content || 
                                 getCookie('csrftoken');
                
                const sendMessageUrl = document
                    .getElementById('chatbot-bubble')
                    ?.dataset
                    .sendMessageUrl || '{% url "chatbot:send_message" %}';

                const response = await fetch(sendMessageUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': csrfToken
                    },
                    body: JSON.stringify({ message: userMessage })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    this.addMessage(data.response, 'bot');
                } else {
                    console.error('Error del servidor:', data);
                    this.addMessage(data.error || 'Lo siento, ocurrió un error. Intenta nuevamente.', 'bot');
                }
            } catch (error) {
                console.error('Error de conexión:', error);
                this.addMessage('Error de conexión. Verifica tu conexión a internet.', 'bot');
            }
            
            this.isLoading = false;
        },
        
        addMessage(text, sender) {
            const messagesContainer = document.getElementById('chat-messages');
            const messageDiv = document.createElement('div');
            
            if (sender === 'user') {
                messageDiv.className = 'bg-arg-azul text-white rounded-lg p-3 mb-3 ml-8';
            } else {
                messageDiv.className = 'bg-gray-100 rounded-lg p-3 mb-3 mr-8';
            }
            
            messageDiv.innerHTML = `<p class="text-sm whitespace-pre-line"></p>`;
            messageDiv.querySelector('p').textContent = text;
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
    }
}
</script>
