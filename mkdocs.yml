site_name: Chaco — Seguimiento de desarrollo
site_url: https://Mkdir-arg.github.io/Chaco/
docs_dir: docs/client
site_dir: site

theme:
  name: material
  language: es
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.expand
    - search.highlight
    - search.suggest
    - toc.follow

plugins:
  - search:
      lang: es

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Inicio: index.md
  - Proyecto:
    - Kick Off: kickoff.md
    - Equipo: team.md
    - Metodología: methodology.md
    - Gobernanza: governance.md
    - Arquitectura: architecture.md
  - Sprints:
    - Todos los sprints: sprints/index.md
    - Sprint 001 — Gestión base de ciudadanos: sprints/sprint-001.md
  - Plantillas operativas:
    - Caso de prueba base: templates/caso-prueba-base.md
    - Instancia de prueba: templates/instancia-prueba.md
    - Minuta de reunión: templates/minuta-reunion.md
    - Estimación de horas: templates/estimacion.md
    - Reporte de pruebas: templates/reporte-pruebas.md
    - Acta de cierre: templates/acta-cierre.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Mkdir-arg/Chaco
