name: "Sub-issue ejecutable"
description: "Tarea concreta de sprint derivada de una epica y un analisis"
title: "[TASK] "
labels: ["task"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## Sub-issue ejecutable
        Esta tarea debe poder completarse en sprint y tener trazabilidad completa.

  - type: input
    id: epica_padre
    attributes:
      label: "Epica padre"
      placeholder: "Ej: #45"
    validations:
      required: true

  - type: input
    id: analisis_origen
    attributes:
      label: "Analisis de origen"
      placeholder: "Ej: #78"
    validations:
      required: true

  - type: input
    id: objetivo
    attributes:
      label: "Objetivo"
      placeholder: "Resultado concreto que entrega esta tarea"
    validations:
      required: true

  - type: textarea
    id: alcance
    attributes:
      label: "Alcance"
      placeholder: |
        - Incluye ...
        - Incluye ...
    validations:
      required: true

  - type: textarea
    id: criterios_aceptacion
    attributes:
      label: "Criterios de aceptacion"
      placeholder: |
        - [ ] Dado ..., cuando ..., entonces ...
    validations:
      required: true

  - type: dropdown
    id: prioridad
    attributes:
      label: "Prioridad"
      options:
        - Alta
        - Media
        - Baja
    validations:
      required: true

  - type: input
    id: estimacion_horas
    attributes:
      label: "Estimacion (horas)"
      placeholder: "Ej: 6"

  - type: input
    id: modulo
    attributes:
      label: "Modulo"
      placeholder: "Ej: legajos"

  - type: textarea
    id: definition_ready
    attributes:
      label: "Definition of Ready"
      placeholder: |
        - [ ] Analisis validado
        - [ ] Criterios de aceptacion claros
        - [ ] Dependencias identificadas
    validations:
      required: true

  - type: textarea
    id: definition_done
    attributes:
      label: "Definition of Done"
      placeholder: |
        - [ ] Implementado
        - [ ] PR vinculada
        - [ ] Validado funcional/QA
    validations:
      required: true

  - type: input
    id: pr_vinculada
    attributes:
      label: "PR vinculada"
      placeholder: "Ej: #321"
