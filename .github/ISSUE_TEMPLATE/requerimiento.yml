name: "Requerimiento"
description: "Nuevo requerimiento funcional del cliente (ICORE / Provincia del Chaco)"
title: "[REQ] "
labels: ["requerimiento"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## Nuevo requerimiento
        Completá este formulario para dejar alcance y aceptación claros antes de estimar o desarrollar.

  - type: input
    id: objetivo
    attributes:
      label: "Objetivo"
      description: "Qué resultado de negocio se busca"
      placeholder: "Ej: Permitir al ciudadano consultar el estado de su trámite en línea"
    validations:
      required: true

  - type: textarea
    id: contexto
    attributes:
      label: "Contexto / Problema"
      description: "Situación actual y por qué se necesita este cambio"
      placeholder: "Ej: Actualmente el ciudadano debe llamar por telefono para conocer el estado..."
    validations:
      required: true

  - type: textarea
    id: alcance
    attributes:
      label: "Alcance"
      description: "Qué incluye este requerimiento (módulos, pantallas, procesos)"
      placeholder: "Incluye: módulo trámites, vista de detalle, notificación por email"
    validations:
      required: true

  - type: textarea
    id: exclusiones
    attributes:
      label: "Exclusiones"
      description: "Qué queda fuera del alcance"
      placeholder: "No incluye: integracion con sistema X, modificacion de datos historicos"
    validations:
      required: true

  - type: textarea
    id: criterios_aceptacion
    attributes:
      label: "Criterios de Aceptacion"
      description: "Cómo se valida que el requerimiento quedó correctamente implementado"
      placeholder: "- [ ] Criterio 1\n- [ ] Criterio 2"
    validations:
      required: true

  - type: dropdown
    id: prioridad
    attributes:
      label: "Prioridad"
      description: "Definida con el cliente"
      options:
        - "Alta - bloquea operacion o es compromiso contractual"
        - "Media - mejora importante, no bloquea"
        - "Baja - mejora menor o cosmetica"
    validations:
      required: true

  - type: input
    id: estimacion
    attributes:
      label: "Estimacion (rango de horas)"
      description: "Completar luego del análisis"
      placeholder: "Pendiente de analisis"

  - type: input
    id: aprobador
    attributes:
      label: "Aprobador del cliente"
      description: "Nombre y rol del referente funcional"
      placeholder: "Ej: Juan Perez - Referente funcional ICORE"
    validations:
      required: true

  - type: dropdown
    id: estado_inicial
    attributes:
      label: "Estado inicial en el flujo"
      options:
        - "Backlog"
        - "En analisis"
    validations:
      required: true

  - type: textarea
    id: notas
    attributes:
      label: "Notas adicionales"
      description: "Adjuntos, links de referencia, capturas u otra información relevante"
      placeholder: "Opcional"
