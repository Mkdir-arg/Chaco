name: "Analisis funcional"
description: "Analisis que completa la informacion de una epica antes de ejecutar"
title: "[ANALISIS] "
labels: ["analisis"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## Analisis funcional
        Este issue documenta alcance y reglas antes de crear sub-issues ejecutables.

  - type: input
    id: epica_padre
    attributes:
      label: "Epica padre"
      description: "Numero o link de la epica"
      placeholder: "Ej: #45"
    validations:
      required: true

  - type: input
    id: modulo
    attributes:
      label: "Modulo"
      placeholder: "Ej: legajos"
    validations:
      required: true

  - type: textarea
    id: actores
    attributes:
      label: "Actores y contexto"
      placeholder: "Quien usa esto y en que escenario"
    validations:
      required: true

  - type: textarea
    id: flujo_principal
    attributes:
      label: "Flujo principal"
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: reglas_negocio
    attributes:
      label: "Reglas de negocio"
      placeholder: |
        - Regla 1
        - Regla 2
    validations:
      required: true

  - type: textarea
    id: criterios_aceptacion
    attributes:
      label: "Criterios de aceptacion"
      placeholder: |
        - [ ] Dado ..., cuando ..., entonces ...
        - [ ] Dado ..., cuando ..., entonces ...
    validations:
      required: true

  - type: textarea
    id: riesgos_dependencias
    attributes:
      label: "Riesgos y dependencias"
      placeholder: |
        - Riesgo ...
        - Depende de ...

  - type: textarea
    id: sub_issues_sugeridas
    attributes:
      label: "Sub-issues sugeridas"
      description: "Lista propuesta de tareas ejecutables que salen de este analisis"
      placeholder: |
        - [ ] TASK: ...
        - [ ] TASK: ...
    validations:
      required: true
