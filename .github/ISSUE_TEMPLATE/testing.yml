name: "Testing / Pruebas"
description: "Ejecución de un caso de prueba base o creación de una instancia nueva"
title: "[TEST] "
labels: ["testing"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## Reporte de Pruebas
        Usá este issue para ejecutar un caso base existente o crear una instancia nueva.
        Este issue se publica en GitHub Pages como evidencia de calidad.

  - type: dropdown
    id: modo
    attributes:
      label: "Modo de uso"
      description: "Elegí si vas a reutilizar un caso base o crear uno nuevo"
      options:
        - "Usar caso base existente"
        - "Crear caso base nuevo"
    validations:
      required: true

  - type: input
    id: caso_base
    attributes:
      label: "Caso base"
      description: "Nombre o link del caso base que se va a ejecutar"
      placeholder: "Ej: Login / docs/client/templates/caso-prueba-base.md"
    validations:
      required: true

  - type: input
    id: codigo_instancia
    attributes:
      label: "Código de instancia"
      description: "Identificador único para esta ejecución"
      placeholder: "Ej: EX-LOGIN-2026-05-15"
    validations:
      required: true

  - type: input
    id: objetivo
    attributes:
      label: "Objetivo de las pruebas"
      description: "Qué se valida en esta instancia de prueba"
      placeholder: "Ej: Validar acceso al sistema con usuario y contraseña"
    validations:
      required: true

  - type: input
    id: issue_relacionado
    attributes:
      label: "Issue de requerimiento relacionado"
      description: "Número y título del issue funcional que origina esta prueba"
      placeholder: "Ej: #12 - Login de usuarios"
    validations:
      required: true

  - type: textarea
    id: contexto
    attributes:
      label: "Contexto"
      description: "Contexto de esta ejecución puntual"
      placeholder: "Ej: Prueba ejecutada en staging sobre el commit abc123"
    validations:
      required: true

  - type: textarea
    id: alcance
    attributes:
      label: "Alcance de las pruebas"
      description: "Qué parte del caso base se ejecutó en esta instancia"
      placeholder: "Flujos probados: ingreso, validación de credenciales, acceso al home"
    validations:
      required: true

  - type: textarea
    id: exclusiones
    attributes:
      label: "Exclusiones"
      description: "Qué casos quedan fuera de este ciclo de pruebas"
      placeholder: "No incluye: pruebas de performance, integración con sistema X"

  - type: textarea
    id: criterios_aceptacion
    attributes:
      label: "Resultados por Criterio de Aceptación"
      description: "Marcá cada criterio con OK, FALLO o PENDIENTE para esta ejecución"
      placeholder: |
        - [x] El usuario ingresa con credenciales válidas - OK
        - [x] El sistema redirige al panel principal - OK
        - [ ] El sistema bloquea el acceso con credenciales inválidas - PENDIENTE
    validations:
      required: true

  - type: dropdown
    id: resultado_general
    attributes:
      label: "Resultado general"
      options:
        - "Aprobado - todos los criterios OK"
        - "Aprobado con observaciones - hay items pendientes menores"
        - "Rechazado - hay criterios que fallan y bloquean el despliegue"
    validations:
      required: true

  - type: dropdown
    id: prioridad
    attributes:
      label: "Prioridad de resolución de observaciones"
      options:
        - "Alta - bloquea despliegue"
        - "Media - se puede desplegar con workaround"
        - "Baja - se trata en el siguiente sprint"

  - type: input
    id: estimacion
    attributes:
      label: "Estimación de correcciones (rango de horas)"
      description: "Solo si esta instancia deja observaciones a resolver"
      placeholder: "Ej: 2-4 hs"

  - type: input
    id: aprobador
    attributes:
      label: "Aprobador del cliente"
      description: "Referente de ICORE que valida esta instancia de ejecución"
      placeholder: "Ej: Juan Pérez - Referente funcional ICORE"
    validations:
      required: true

  - type: dropdown
    id: estado_inicial
    attributes:
      label: "Estado inicial en el flujo"
      options:
        - "En pruebas"
    validations:
      required: true

  - type: textarea
    id: notas
    attributes:
      label: "Evidencia / Links / Capturas"
      description: "Links a reportes, capturas de pantalla o referencia al caso base"
      placeholder: "Opcional"
