name: "Epica"
description: "Objetivo macro de negocio que se implementa mediante analisis y sub-issues"
title: "[EPICA] "
labels: ["epica"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## Nueva epica
        La epica define el para que. No se ejecuta directo en sprint.

  - type: textarea
    id: objetivo_negocio
    attributes:
      label: "Objetivo de negocio"
      description: "Que resultado se busca lograr"
      placeholder: "Describe el resultado esperado en 1-2 oraciones"
    validations:
      required: true

  - type: textarea
    id: problema
    attributes:
      label: "Problema a resolver"
      placeholder: "Que problema actual existe y a quien impacta"
    validations:
      required: true

  - type: textarea
    id: alcance
    attributes:
      label: "Alcance"
      placeholder: |
        - Incluye ...
        - Incluye ...
    validations:
      required: true

  - type: textarea
    id: fuera_de_alcance
    attributes:
      label: "Fuera de alcance"
      placeholder: |
        - No incluye ...
    validations:
      required: true

  - type: textarea
    id: metricas_exito
    attributes:
      label: "Metricas de exito"
      placeholder: |
        - Metrica 1
        - Metrica 2
    validations:
      required: true

  - type: dropdown
    id: prioridad
    attributes:
      label: "Prioridad"
      options:
        - Alta
        - Media
        - Baja
    validations:
      required: true

  - type: input
    id: modulo_principal
    attributes:
      label: "Modulo principal"
      placeholder: "Ej: legajos, portal, conversaciones"

  - type: textarea
    id: definicion_terminado_epica
    attributes:
      label: "Definicion de terminado de la epica"
      placeholder: |
        - [ ] Analisis funcionales cerrados
        - [ ] Sub-issues criticas completadas
        - [ ] Validacion funcional realizada
    validations:
      required: true

  - type: textarea
    id: referencias
    attributes:
      label: "Referencias"
      description: "Links a documentacion, decisiones o contexto"
      placeholder: "Links relevantes"

