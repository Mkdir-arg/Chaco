name: "Tarea interna"
description: "Tarea técnica, refactor, deuda técnica o tarea de mantenimiento interna del equipo"
title: "[TASK] "
labels: ["task"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## Tarea interna
        Usar para trabajo técnico interno: refactor, mantenimiento, deuda técnica o mejora de calidad.

  - type: input
    id: objetivo
    attributes:
      label: "Objetivo"
      description: "Qué se quiere lograr con esta tarea"
      placeholder: "Ej: Refactorizar el módulo de autenticación para mejorar rendimiento"
    validations:
      required: true

  - type: textarea
    id: contexto
    attributes:
      label: "Contexto / Motivación"
      description: "Por qué es necesaria y qué problema resuelve"
      placeholder: "Ej: El módulo actual tiene código duplicado que dificulta el mantenimiento..."
    validations:
      required: true

  - type: textarea
    id: alcance
    attributes:
      label: "Alcance"
      description: "Archivos, módulos o áreas involucradas"
      placeholder: "Archivos afectados: core/auth.py, users/views.py"
    validations:
      required: true

  - type: textarea
    id: exclusiones
    attributes:
      label: "Exclusiones"
      description: "Qué queda fuera de esta tarea"
      placeholder: "No incluye: cambio de interfaz de usuario, modificación de API pública"

  - type: textarea
    id: criterios_aceptacion
    attributes:
      label: "Criterios de Aceptación"
      description: "Cómo se valida que la tarea está completa"
      placeholder: "- [ ] Los tests existentes pasan sin errores\n- [ ] El código pasa la revisión"
    validations:
      required: true

  - type: dropdown
    id: prioridad
    attributes:
      label: "Prioridad"
      options:
        - "Alta - bloquea otras tareas o tiene deuda técnica crítica"
        - "Media - mejora importante pero no urgente"
        - "Baja - mejora menor o cosmética"
    validations:
      required: true

  - type: input
    id: estimacion
    attributes:
      label: "Estimación (rango de horas)"
      placeholder: "Ej: 2-4 hs"

  - type: input
    id: aprobador
    attributes:
      label: "Aprobador del cliente (si aplica)"
      description: "Opcional para tareas internas"
      placeholder: "N/A para tareas internas"

  - type: dropdown
    id: estado_inicial
    attributes:
      label: "Estado inicial en el flujo"
      options:
        - "Backlog"
        - "En análisis"
        - "En desarrollo"
    validations:
      required: true

  - type: textarea
    id: notas
    attributes:
      label: "Notas adicionales"
      placeholder: "Opcional"
