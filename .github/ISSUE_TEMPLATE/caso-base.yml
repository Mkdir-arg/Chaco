name: "Caso base de prueba"
description: "Definición de un caso maestro reutilizable para pruebas recurrentes"
title: "[CB] "
labels: ["testing"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## Caso base de prueba
        Usá este issue para definir un caso maestro único que luego pueda reutilizarse en múltiples instancias de ejecución.

  - type: input
    id: codigo
    attributes:
      label: "Código del caso base"
      description: "Identificador único del caso base"
      placeholder: "Ej: CB-LOGIN"
    validations:
      required: true

  - type: input
    id: nombre
    attributes:
      label: "Nombre del caso"
      description: "Nombre corto y claro del flujo que se valida"
      placeholder: "Ej: Login de usuarios"
    validations:
      required: true

  - type: input
    id: modulo
    attributes:
      label: "Módulo"
      description: "Área funcional donde aplica el caso base"
      placeholder: "Ej: portal, legajos, conversaciones"
    validations:
      required: true

  - type: textarea
    id: objetivo
    attributes:
      label: "Objetivo"
      description: "Qué comportamiento estable debe garantizar este caso"
      placeholder: "Ej: Validar el acceso correcto al sistema con credenciales válidas"
    validations:
      required: true

  - type: textarea
    id: precondiciones
    attributes:
      label: "Precondiciones"
      description: "Datos, accesos o servicios necesarios antes de ejecutar"
      placeholder: "Ej: Usuario activo, entorno staging, servicio de autenticación disponible"
    validations:
      required: true

  - type: textarea
    id: pasos
    attributes:
      label: "Pasos del caso base"
      description: "Secuencia estándar que se debe repetir en cada ejecución"
      placeholder: |
        1. Ingresar a la pantalla de login
        2. Completar usuario y contraseña
        3. Presionar ingresar
    validations:
      required: true

  - type: textarea
    id: resultado_esperado
    attributes:
      label: "Resultado esperado"
      description: "Qué debe ocurrir si el caso funciona correctamente"
      placeholder: "Ej: El sistema autentica al usuario y muestra el panel principal"
    validations:
      required: true

  - type: textarea
    id: criterios_aceptacion
    attributes:
      label: "Criterios de aceptación"
      description: "Criterios que este caso base debe cumplir"
      placeholder: |
        - [ ] El usuario ingresa con credenciales válidas
        - [ ] El sistema redirige al panel principal
        - [ ] El acceso inválido es rechazado
    validations:
      required: true

  - type: input
    id: responsable
    attributes:
      label: "Responsable"
      description: "Nombre del referente que mantiene este caso base"
      placeholder: "Ej: Agostina Coppola"
    validations:
      required: true

  - type: textarea
    id: notas
    attributes:
      label: "Notas adicionales"
      description: "Observaciones, dependencias o links a documentación relacionada"
      placeholder: "Opcional"