name: "CI - Quality Checks"

# Se ejecuta en cada PR y en push a main
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # -------------------------------------------------------
  # 1. Validar build de MkDocs (documentación)
  # -------------------------------------------------------
  docs-build:
    name: "Validar build de documentacion MkDocs"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Instalar MkDocs y dependencias
        run: pip install mkdocs-material

      - name: Validar build de documentacion
        run: mkdocs build --strict
        # --strict falla si hay warnings (links rotos, referencias inválidas)
        # Esto garantiza que la documentación siempre buildea antes de mergear

  # -------------------------------------------------------
  # 2. Verificar estructura del repositorio
  # -------------------------------------------------------
  structure-check:
    name: "Verificar estructura de archivos requeridos"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Verificar archivos obligatorios del repositorio
        run: |
          echo "Verificando archivos de gobernanza..."
          files=(
            "CONTRIBUTING.md"
            ".github/CODEOWNERS"
            ".github/PULL_REQUEST_TEMPLATE.md"
            ".github/ISSUE_TEMPLATE/requerimiento.yml"
            ".github/ISSUE_TEMPLATE/bug.yml"
            ".github/ISSUE_TEMPLATE/testing.yml"
            ".github/ISSUE_TEMPLATE/task.yml"
            ".github/ISSUE_TEMPLATE/config.yml"
            "mkdocs.yml"
            "docs/client/methodology.md"
          )
          missing=0
          for f in "${files[@]}"; do
            if [ ! -f "$f" ]; then
              echo "FALTANTE: $f"
              missing=1
            else
              echo "OK: $f"
            fi
          done
          if [ $missing -eq 1 ]; then
            echo "Error: faltan archivos de gobernanza obligatorios"
            exit 1
          fi
          echo "Todos los archivos de gobernanza presentes."

