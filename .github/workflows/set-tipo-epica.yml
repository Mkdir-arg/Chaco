name: "Set Tipo=Epica on new epics"

on:
  issues:
    types: [opened, reopened, labeled]

permissions:
  contents: read
  issues: read

jobs:
  set-tipo-epica:
    if: contains(toJson(github.event.issue.labels.*.name), 'epica')
    runs-on: ubuntu-latest
    steps:
      - name: Set field Tipo=Epica in Project v2
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECTS_TOKEN != '' && secrets.PROJECTS_TOKEN || github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const projectNumber = 1;
            const issueNumber = context.payload.issue.number;

            const q = `
              query($owner:String!, $repo:String!, $projectNumber:Int!, $issueNumber:Int!) {
                user(login:$owner) {
                  projectV2(number:$projectNumber) {
                    id
                    fields(first:100) {
                      nodes {
                        ... on ProjectV2FieldCommon { id name }
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                          options { id name }
                        }
                      }
                    }
                  }
                  repository(name:$repo) {
                    issue(number:$issueNumber) {
                      id
                    }
                  }
                }
              }
            `;

            const data = await github.graphql(q, { owner, repo, projectNumber, issueNumber });
            const project = data.user.projectV2;
            const issueId = data.user.repository.issue.id;
            const projectId = project.id;

            // Find Tipo field
            const tipoField = project.fields.nodes.find(f => f.name === 'Tipo');
            if (!tipoField) {
              core.setFailed('Campo Tipo no encontrado en el Project');
              return;
            }
            const epicaOption = tipoField.options?.find(o => o.name === 'Epica');
            if (!epicaOption) {
              core.setFailed('Opcion Epica no encontrada en el campo Tipo');
              return;
            }

            // Add issue to project if not already there
            const addMutation = `
              mutation($projectId:ID!, $contentId:ID!) {
                addProjectV2ItemById(input:{projectId:$projectId, contentId:$contentId}) {
                  item { id }
                }
              }
            `;
            const addResult = await github.graphql(addMutation, { projectId, contentId: issueId });
            const itemId = addResult.addProjectV2ItemById.item.id;

            // Set Tipo = Epica
            const setMutation = `
              mutation($projectId:ID!, $itemId:ID!, $fieldId:ID!, $optionId:String!) {
                updateProjectV2ItemFieldValue(input:{
                  projectId:$projectId,
                  itemId:$itemId,
                  fieldId:$fieldId,
                  value:{ singleSelectOptionId:$optionId }
                }) {
                  projectV2Item { id }
                }
              }
            `;
            await github.graphql(setMutation, {
              projectId,
              itemId,
              fieldId: tipoField.id,
              optionId: epicaOption.id
            });

            console.log(`Tipo=Epica seteado correctamente en item ${itemId}`);
