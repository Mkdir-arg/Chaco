name: "Set Project Tipo from issue labels"

on:
  issues:
    types: [opened, reopened, labeled]

permissions:
  contents: read
  issues: read

jobs:
  set-project-tipo:
    if: contains(toJson(github.event.issue.labels.*.name), 'epica') || contains(toJson(github.event.issue.labels.*.name), 'analisis') || contains(toJson(github.event.issue.labels.*.name), 'task')
    runs-on: ubuntu-latest
    steps:
      - name: Set field Tipo in Project v2
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECTS_TOKEN != '' && secrets.PROJECTS_TOKEN || github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const projectNumber = 1;
            const issueNumber = context.payload.issue.number;
            const labels = context.payload.issue.labels.map(l => l.name);

            function resolveTargetTipo(issueLabels) {
              if (issueLabels.includes('epica')) return ['Epica', 'Épica'];
              if (issueLabels.includes('analisis')) return ['Analisis funcional', 'Análisis funcional', 'Analisis'];
              if (issueLabels.includes('task')) return ['Sub-issue ejecutable', 'Sub issue ejecutable', 'Task'];
              return null;
            }

            const targetNames = resolveTargetTipo(labels);
            if (!targetNames) {
              console.log('No aplica mapeo de tipo para labels:', labels.join(', '));
              return;
            }

            const q = `
              query($owner:String!, $repo:String!, $projectNumber:Int!, $issueNumber:Int!) {
                user(login:$owner) {
                  projectV2(number:$projectNumber) {
                    id
                    fields(first:100) {
                      nodes {
                        ... on ProjectV2FieldCommon { id name }
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                          options { id name }
                        }
                      }
                    }
                  }
                  repository(name:$repo) {
                    issue(number:$issueNumber) {
                      id
                    }
                  }
                }
              }
            `;

            const data = await github.graphql(q, { owner, repo, projectNumber, issueNumber });
            const project = data.user.projectV2;
            const issueId = data.user.repository.issue.id;
            const projectId = project.id;

            const tipoField = project.fields.nodes.find(f => f.name === 'Tipo');
            if (!tipoField) {
              core.setFailed('Campo Tipo no encontrado en el Project');
              return;
            }
            const tipoOption = tipoField.options?.find(o => targetNames.includes(o.name));
            if (!tipoOption) {
              core.setFailed(`No se encontro opcion de Tipo para: ${targetNames.join(' / ')}`);
              return;
            }

            const addMutation = `
              mutation($projectId:ID!, $contentId:ID!) {
                addProjectV2ItemById(input:{projectId:$projectId, contentId:$contentId}) {
                  item { id }
                }
              }
            `;
            const addResult = await github.graphql(addMutation, { projectId, contentId: issueId });
            const itemId = addResult.addProjectV2ItemById.item.id;

            const setMutation = `
              mutation($projectId:ID!, $itemId:ID!, $fieldId:ID!, $optionId:String!) {
                updateProjectV2ItemFieldValue(input:{
                  projectId:$projectId,
                  itemId:$itemId,
                  fieldId:$fieldId,
                  value:{ singleSelectOptionId:$optionId }
                }) {
                  projectV2Item { id }
                }
              }
            `;
            await github.graphql(setMutation, {
              projectId,
              itemId,
              fieldId: tipoField.id,
              optionId: tipoOption.id
            });

            console.log(`Tipo=${tipoOption.name} seteado correctamente en item ${itemId}`);
