name: "Set Tipo=Epica on new epics"

on:
  issues:
    types: [opened, reopened, labeled]

permissions:
  contents: read
  issues: read
  projects: write

jobs:
  set-tipo-epica:
    if: contains(toJson(github.event.issue.labels.*.name), 'epica')
    runs-on: ubuntu-latest
    steps:
      - name: Set field Tipo=Epica in Project v2
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECTS_TOKEN != '' && secrets.PROJECTS_TOKEN || github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const projectNumber = 1;
            const issueNumber = context.payload.issue.number;

            const q = `
              query($owner:String!, $repo:String!, $projectNumber:Int!, $issueNumber:Int!) {
                user(login:$owner) {
                  projectV2(number:$projectNumber) {
                    id
                    fields(first:100) {
                      nodes {
                        ... on ProjectV2FieldCommon { id name }
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                          options { id name }
                        }
                      }
                    }
                  }
                }
                organization(login:$owner) {
                  projectV2(number:$projectNumber) {
                    id
                    fields(first:100) {
                      nodes {
                        ... on ProjectV2FieldCommon { id name }
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                          options { id name }
                        }
                      }
                    }
                  }
                }
                repository(owner:$owner, name:$repo) {
                  issue(number:$issueNumber) {
                    id
                    projectItems(first:100) {
                      nodes {
                        id
                        project { id }
                      }
                    }
                  }
                }
              }
            `;

            const data = await github.graphql(q, { owner, repo, projectNumber, issueNumber });
            const project = data.user?.projectV2 || data.organization?.projectV2;

            if (!project) {
              core.setFailed(`No se encontro Project v2 #${projectNumber} para owner ${owner}`);
              return;
            }

            const issue = data.repository?.issue;
            if (!issue) {
              core.setFailed(`No se encontro issue #${issueNumber}`);
              return;
            }

            const tipoField = project.fields.nodes.find(
              (f) => f.name && f.name.toLowerCase() === 'tipo' && f.options
            );

            if (!tipoField) {
              core.setFailed('No se encontro el campo Tipo en el Project');
              return;
            }

            const epicaOption = tipoField.options.find(
              (o) => o.name && o.name.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase() === 'epica'
            );

            if (!epicaOption) {
              core.setFailed('No se encontro la opcion Epica en el campo Tipo');
              return;
            }

            let item = issue.projectItems.nodes.find((n) => n.project.id === project.id);

            if (!item) {
              const addMutation = `
                mutation($projectId:ID!, $contentId:ID!) {
                  addProjectV2ItemById(input:{projectId:$projectId, contentId:$contentId}) {
                    item { id }
                  }
                }
              `;
              const added = await github.graphql(addMutation, {
                projectId: project.id,
                contentId: issue.id,
              });
              item = added.addProjectV2ItemById.item;
            }

            const updateMutation = `
              mutation($projectId:ID!, $itemId:ID!, $fieldId:ID!, $optionId:String!) {
                updateProjectV2ItemFieldValue(
                  input:{
                    projectId:$projectId,
                    itemId:$itemId,
                    fieldId:$fieldId,
                    value:{ singleSelectOptionId:$optionId }
                  }
                ) {
                  projectV2Item { id }
                }
              }
            `;

            await github.graphql(updateMutation, {
              projectId: project.id,
              itemId: item.id,
              fieldId: tipoField.id,
              optionId: epicaOption.id,
            });

            core.info(`Issue #${issueNumber} seteado con Tipo=Epica en Project #${projectNumber}`);
